<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formwright Playground — build forms from a schema in real time</title>
    <meta
      name="description"
      content="Edit or generate a form schema and watch it render to real, surgically-updating DOM — including multi-step wizards — then submit and see the payload."
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>Formwright</strong>
        <span class="tag">Playground</span>
      </div>
      <div class="brand-links">
        <a class="repo" href="./forge.html">Form Builder →</a>
        <a class="repo" href="./builder.html">Theme Builder →</a>
        <a class="repo" href="./settings.html">Settings Builder →</a>
        <a class="repo" href="./grid.html">Data Grid →</a>
        <a
          class="repo"
          href="https://github.com/aliarsalan177/formwright"
          target="_blank"
          rel="noreferrer"
        >
          GitHub ↗
        </a>
      </div>
    </header>

    <main class="layout">
      <!-- 1. Build / generate the schema -->
      <section class="panel">
        <h2>1 · Schema</h2>
        <div class="examples">
          <label for="example">Example</label>
          <select id="example">
            <option value="checkout">Checkout — group + collection + conditions</option>
            <option value="showcase">Showcase — headings, tooltips, i18n, actions</option>
            <option value="signup">Sign up — simple conditional form</option>
            <option value="wizard">Wizard — multi-step form (bar progress)</option>
            <option value="wizard-tabs">Wizard — tab progress</option>
            <option value="wizard-numbers">Wizard — numbered progress</option>
          </select>
        </div>
        <div id="wizard-layout-row" class="examples wizard-layout-row" hidden>
          <label for="wizard-layout">Wizard progress</label>
          <select id="wizard-layout">
            <option value="bar">Bar labels</option>
            <option value="tabs">Tabs</option>
            <option value="numbers">Numbers</option>
          </select>
        </div>
        <div class="builder">
          <input id="b-id" placeholder="field id (e.g. email)" />
          <input id="b-label" placeholder="label (e.g. Email)" />
          <select id="b-type">
            <option value="text">text</option>
            <option value="email">email</option>
            <option value="password">password</option>
            <option value="number">number</option>
            <option value="textarea">textarea</option>
            <option value="checkbox">checkbox</option>
            <option value="toggle">toggle</option>
            <option value="select">select</option>
            <option value="radio">radio</option>
          </select>
          <label class="req"><input id="b-required" type="checkbox" /> required</label>
          <button id="b-add" type="button">+ Add field</button>
        </div>
        <textarea id="schema" spellcheck="false" aria-label="Schema JSON"></textarea>
        <p id="schema-status" class="status"></p>
      </section>

      <!-- 2. The live, working form -->
      <section class="panel">
        <h2>2 · Live form</h2>
        <p id="wizard-hint" class="demo-hint" hidden></p>
        <div id="form-host" class="form-host"></div>
      </section>

      <!-- 3. The result -->
      <section class="panel">
        <h2>3 · Result</h2>
        <h3>Live values</h3>
        <pre id="values" class="result"></pre>
        <h3>Last submitted payload</h3>
        <pre id="payload" class="result">— submit the form —</pre>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
