<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formwright — Theme / Settings Builder</title>
    <meta
      name="description"
      content="A Shopify-style theme builder built entirely from Formwright forms: per-section settings schemas drive a live theme preview from one payload."
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>Formwright</strong>
        <span class="tag">Theme Builder</span>
      </div>
      <a class="repo" href="./index.html">← Form playground</a>
    </header>

    <main class="builder">
      <!-- 1. Sections (a "nav rail" — could come from your store API) -->
      <aside class="builder-rail">
        <h2>Sections</h2>
        <div id="builder-nav" class="builder-nav"></div>
        <p class="rail-note">
          Each section is a Formwright <strong>form</strong>. Its schema could load from your store
          API or be generated by <code>@formwright/ai</code>.
        </p>
      </aside>

      <!-- 2. The selected section's settings form -->
      <section class="panel builder-settings">
        <h2>Settings</h2>
        <div id="builder-panel" class="form-host"></div>
      </section>

      <!-- 3. Live theme preview, rendered from the combined payload -->
      <section class="builder-stage">
        <h2 class="stage-title">Live preview</h2>
        <div id="builder-preview" class="builder-preview"></div>
        <details class="builder-payload-wrap">
          <summary>Theme payload</summary>
          <pre id="builder-payload" class="result"></pre>
        </details>
      </section>
    </main>

    <script type="module" src="/src/builder.ts"></script>
  </body>
</html>
