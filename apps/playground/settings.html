<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formwright — Settings Builder</title>
    <meta
      name="description"
      content="An iOS-style settings app built from Formwright: a sidebar of sections, drill-down sub-sections, per-field save endpoints, and a complete payload."
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>Formwright</strong>
        <span class="tag">Settings Builder</span>
      </div>
      <div class="brand-links">
        <a class="repo" href="./index.html">← Form playground</a>
        <a class="repo" href="./forge.html">Form Builder →</a>
      </div>
    </header>

    <main class="settings">
      <!-- Top-level sections (could load from your settings API) -->
      <aside class="settings-rail">
        <div class="settings-search">Settings</div>
        <div id="settings-nav" class="settings-nav"></div>
      </aside>

      <!-- The current section: breadcrumb/back, its form, and drill-down sub-sections -->
      <section class="settings-detail">
        <div id="settings-head" class="settings-head"></div>
        <div id="settings-panel" class="form-host"></div>
        <div id="settings-children" class="settings-children"></div>
      </section>

      <!-- Per-field saves (each toggle PATCHes its own endpoint) + the complete payload -->
      <aside class="settings-side">
        <h2>Save activity</h2>
        <pre id="settings-saves" class="result"></pre>
        <h2 style="margin-top: 16px">Section payload</h2>
        <pre id="settings-payload" class="result"></pre>
        <p class="settings-note">
          Each change PATCHes its own endpoint
          (<code>/api/settings/&lt;path&gt;/&lt;field&gt;</code>);
          <strong>Save all</strong> PUTs the complete section payload.
        </p>
      </aside>
    </main>

    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
