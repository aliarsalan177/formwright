name: Deploy demo

# Builds the Formwright playground + Storybook and publishes to GitHub Pages.
# Enable once: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build playground & Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build library packages, then demos (turbo orders deps first).
      - run: pnpm --filter "./packages/*" build
      - run: pnpm --filter @formwright/playground build
      - run: pnpm --filter @formwright/storybook build:pages

      - name: Merge Storybook into site artifact
        run: |
          mkdir -p apps/playground/dist/storybook
          cp -r apps/storybook/dist/* apps/playground/dist/storybook/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/playground/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
